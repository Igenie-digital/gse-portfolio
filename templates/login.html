<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — GSE Portfolio</title>
  <script>
    (function(){
      var t = localStorage.getItem("gse-theme") || "light";
      document.documentElement.setAttribute("data-bs-theme", t);
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css?v=4" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    .auth-card { max-width: 420px; width: 100%; }
    .auth-brand { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .divider { position: relative; text-align: center; margin: 1rem 0; }
    .divider::before {
      content: ""; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--bs-border-color);
    }
    .divider span {
      position: relative; background: var(--bs-body-bg);
      padding: 0 0.75rem; font-size: 0.8rem; color: var(--bs-secondary-color);
    }
  </style>
</head>
<body class="bg-body-secondary">

<div class="container d-flex justify-content-center py-5">
  <div class="auth-card w-100">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="auth-brand">
        <i class="bi bi-bar-chart-fill text-warning me-2"></i>GSE Portfolio
      </div>
      <p class="text-muted small mt-1 mb-0">Ghana Stock Exchange · Portfolio Tracker</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-1">Welcome back</h5>
        <p class="text-muted small mb-4">Sign in to your account to continue</p>

        {% if error %}
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control"
                     placeholder="you@example.com" autocomplete="email" required autofocus>
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-semibold small">Password</label>
            </div>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="pwdField" class="form-control"
                     placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
                <i class="bi bi-eye" id="pwdEye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>

        <div class="divider mt-4"><span>New here?</span></div>

        <a href="/signup" class="btn btn-outline-secondary w-100">
          <i class="bi bi-person-plus me-1"></i>Create an account
        </a>
      </div>
    </div>

    <p class="text-center text-muted mt-3" style="font-size:0.75rem">
      © {{ 2026 }} GSE Portfolio Tracker
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
  var f = document.getElementById("pwdField");
  var e = document.getElementById("pwdEye");
  if (f.type === "password") {
    f.type = "text";
    e.className = "bi bi-eye-slash";
  } else {
    f.type = "password";
    e.className = "bi bi-eye";
  }
}
</script>
</body>
</html>
