<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GSE Portfolio{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#111520">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GSE Portfolio">
  <link rel="apple-touch-icon" href="/static/icons/icon.svg">

  <!-- Apply saved theme BEFORE any CSS loads — prevents flash and ensures selectors match -->
  <script>
    (function () {
      var t = localStorage.getItem("gse-theme") || "light";
      document.documentElement.setAttribute("data-bs-theme", t);
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css?v=4" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-bar-chart-fill text-warning me-1"></i>GSE Portfolio
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/trades"><i class="bi bi-journal-text me-1"></i>Trade Log</a></li>
      <li class="nav-item"><a class="nav-link" href="/market"><i class="bi bi-graph-up me-1"></i>Market Board</a></li>
    </ul>
    <button class="btn btn-outline-warning btn-sm ms-3" id="refreshBtn" onclick="triggerScrape()">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh Prices
    </button>
    <button class="btn btn-outline-secondary btn-sm ms-2 rounded-circle" id="themeToggle"
            onclick="toggleTheme()" title="Toggle dark / light mode">
      <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
    {% if user %}
    <div class="dropdown ms-3">
      <button class="btn btn-sm btn-outline-light dropdown-toggle d-flex align-items-center gap-2"
              data-bs-toggle="dropdown">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-md-inline">{{ user.name }}</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><span class="dropdown-item-text small text-muted">{{ user.email }}</span></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <form method="post" action="/logout" class="px-3">
            <button class="btn btn-outline-danger btn-sm w-100">
              <i class="bi bi-box-arrow-right me-1"></i>Sign Out
            </button>
          </form>
        </li>
      </ul>
    </div>
    {% endif %}
  </div>
</nav>

<!-- Toast notification -->
<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
  <div id="scrapeToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<script>
function _isDark() {
  return document.documentElement.getAttribute("data-bs-theme") === "dark";
}

function syncThemeIcon() {
  var icon = document.getElementById("themeIcon");
  if (icon) icon.className = _isDark() ? "bi bi-sun-fill" : "bi bi-moon-fill";
}

// Set Chart.js text/grid colours to match theme — call before creating any chart
function applyChartDefaults() {
  if (typeof Chart === "undefined") return;
  Chart.defaults.color       = _isDark() ? "rgba(255,255,255,0.75)" : "#666";
  Chart.defaults.borderColor = _isDark() ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.10)";
}

function toggleTheme() {
  var next = _isDark() ? "light" : "dark";
  document.documentElement.setAttribute("data-bs-theme", next);
  localStorage.setItem("gse-theme", next);
  location.reload();   // reload so all Chart.js instances redraw with correct colours
}

function showToast(msg, ok) {
  var el = document.getElementById("scrapeToast");
  el.className = "toast align-items-center text-white border-0 " + (ok ? "bg-success" : "bg-danger");
  document.getElementById("toastMsg").textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, {delay: 6000}).show();
}

async function triggerScrape() {
  var btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Fetching…';
  try {
    var res  = await fetch("/api/scrape", {method: "POST"});
    var data = await res.json();
    showToast(data.message, data.status === "ok");
    if (data.status === "ok") setTimeout(function(){ location.reload(); }, 1500);
  } catch(e) {
    showToast("Request failed: " + e, false);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Refresh Prices';
  }
}

document.addEventListener("DOMContentLoaded", syncThemeIcon);

// Register service worker for PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/sw.js").catch(function(){});
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
